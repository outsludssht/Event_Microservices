version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672" 
      - "15672:15672"

  order_db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orders_db
    ports:
      - "5431:5432"

  payment_db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payments_db
    ports:
      - "5432:5432"

  order-service:
    build: ./order_service
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
      - order_db

  payment-service:
    build: ./payment_service
    depends_on:
      - rabbitmq

  notification-service:
    build: ./notification_service
    depends_on:
      - rabbitmq